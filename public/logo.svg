<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#eaece2"/>

  <!-- Dark green arc — gap at bottom (55° to 125° in SVG visual angles)
       Point at 55°:  (100 + 82·cos55°, 100 + 82·sin55°) = (147.0, 167.1)
       Point at 125°: (100 + 82·cos125°, 100 + 82·sin125°) = (53.0, 167.1) -->
  <path d="M 53 167.1 A 82 82 0 1 1 147 167.1"
        stroke="#1b3829" stroke-width="18" fill="none"
        stroke-linecap="round"/>

  <!-- Light green accent arc (bottom gap, ~70°) -->
  <path d="M 147 167.1 A 82 82 0 0 1 53 167.1"
        stroke="#7cbf3c" stroke-width="18" fill="none"
        stroke-linecap="round"/>

  <!-- Letter M — drawn as explicit polygon for consistency across environments -->
  <!-- Two outer vertical strokes + V shape cut from top, inner strokes -->
  <polygon points="
    58,128
    58,54
    76,54
    100,90
    124,54
    142,54
    142,128
    126,128
    126,76
    100,96
    74,76
    74,128
  " fill="#1b3829"/>
</svg>
